# see https://docs.codecov.io/docs/codecov-yaml
coverage:
  range: 50..100
  round: down
  precision: 2
  status:
    # Overall project coverage may not drop by more than 1% between PRs.
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    # New / modified code in a PR must be at least 80% covered.
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error
ignore:
  - "test/"
  - "topobench/run.py"
